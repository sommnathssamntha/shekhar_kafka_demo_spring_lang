spring.application.name=consumerkafkaa

#essential consumer group logic
server.port=0
spring.kafka.consumer.bootstrap-servers=localhost:9092,localhost:9094,localhost:9096
spring.kafka.consumer.group-id=product-created-events-group


# starte from beginning if it's a brand new consumer group
spring.kafka.consumer.auto-offset-reset=earliest

#relaibility: don't let bad json crash the consumer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Force the consumer to use your record for the value
spring.kafka.consumer.properties.spring.json.value.default.type=com.shekhar.consumerkafkaa.model.CreateProductRestModel
spring.kafka.consumer.properties.spring.json.trusted.packages=com.shekhar.producerkafka.model
# Tell the consumer to ignore the Producer's class path headers
spring.kafka.consumer.properties.spring.json.use.type.headers=false
# Custom Topic Property
app.kafka.product-created-topic=product-created-events-topic

# Prevents the "Rebalance Storm" by only moving necessary partitions
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

# wait for 50ms or 1mb of data at least to reduce consumer's chatting time with the broker
spring.kafka.consumer.properties.fetch.min.bytes=1048576
spring.kafka.consumer.properties.fetch.max.wait.ms=50

# ensure consumer doesn't choke with too much data at once
spring.kafka.consumer.max-poll-records=50

# Disable the "Auto-pilot" timer
spring.kafka.consumer.enable-auto-commit=false
# prevent offset commit until the message is processed successfully in db and acknowledged
spring.kafka.listener.ack-mode=manual_immediate

# Only read messages that successfully committed on the Producer side
spring.kafka.consumer.properties.isolation.level=read_committed



# DB Connection - Storing on G: drive so data persists across restarts
spring.datasource.url=jdbc:h2:file:G:/kafka-logs/h2db/productdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate logic
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (Great for Monday's "Live Demo" if they ask)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console - Access at http://localhost:<port>/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Security fix for H2 Console in Spring Boot 3
spring.h2.console.settings.web-allow-others=true


####logging
# Add [%X{correlationId}] to the pattern. %X pulls from MDC.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] [%X{correlationId}] %logger{36} - %msg%n

debug=false

# Industry Standard for Production
logging.level.root=OFF
logging.level.org.springframework.kafka=OFF
logging.level.org.springframework=off
logging.level.org.springframework.web=INFO
# Keep your business logic visible
logging.level.com.shekhar.consumerkafkaa=info

# Explicitly quiet the Kafka client internals (the main source of flood)
logging.level.org.apache.kafka=WARN
logging.level.org.apache.kafka.clients.consumer.internals=WARN